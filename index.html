<!DOCTYPE html>
<html lang="en-GB">
<head>
<script>
if (localStorage.getItem('ben_authed') !== 'true') {
  window.location.replace('login.html?next=index.html');
}
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Ben's Apps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2B2140;
    --paper:#FFF8EC;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; min-height:100%;
    background:var(--paper);
    font-family:'Nunito', sans-serif;
  }
  .app{
    max-width:520px;
    margin:0 auto;
    padding: max(20px, env(safe-area-inset-top)) 16px 40px;
  }
  h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:28px;
    color:var(--ink);
    text-align:center;
    margin:6px 0 24px;
  }
  h1 span{ color:#FF6B5B; }
  .card{
    display:block;
    text-decoration:none;
    border:5px solid var(--ink);
    border-radius:28px;
    padding:16px 18px 14px;
    margin-bottom:18px;
    background:#fff;
    position:relative;
  }
  .section-title{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:15px;
    color:var(--ink);
    opacity:0.55;
    text-transform:uppercase;
    letter-spacing:1px;
    margin:22px 4px 10px;
  }
  .section-title:first-child{ margin-top:0; }
  .card-top{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .card-emoji{
    font-size:44px;
    line-height:1;
    flex-shrink:0;
  }
  .card-titlewrap{ flex:1; min-width:0; }
  .card-title{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:21px;
    color:var(--ink);
    margin:0 0 2px;
  }
  .card-count{
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:13px;
    color:var(--ink);
    opacity:0.65;
  }
  .go{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:14px;
    color:#fff;
    background:var(--ink);
    padding:7px 14px;
    border-radius:999px;
    white-space:nowrap;
  }
  .skills{
    margin-top:14px;
    padding-top:12px;
    border-top:2px dashed #E4DCC8;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .skill-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .skill-label{
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--ink);
    flex-shrink:0;
  }
  .stars{
    display:flex;
    gap:2px;
  }
  .star{
    font-size:22px;
    line-height:1;
    cursor:pointer;
    filter: grayscale(1) opacity(0.35);
  }
  .star.filled{
    filter:none;
  }
  .footnote{
    text-align:center;
    font-size:12px;
    color:var(--ink);
    opacity:0.5;
    margin-top:8px;
  }
</style>
</head>
<body>
<div class="app">
  <h1>Ben's <span>Apps</span></h1>
  <div id="cards"></div>
  <div class="footnote">Tap a card to open · tap the stars to rate</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyAkpHYce32g6WZ1Vw1--0dUf_sHkA0IQMI",
  authDomain: "ben-apps-a71f6.firebaseapp.com",
  databaseURL: "https://ben-apps-a71f6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ben-apps-a71f6",
  storageBucket: "ben-apps-a71f6.firebasestorage.app",
  messagingSenderId: "163616174580",
  appId: "1:163616174580:web:70e8a99d31a793b21449a1"
});
firebase.auth().signInAnonymously().catch(e => console.error('Auth failed', e));
</script>
<script>
const apps = [
  { id:'soundpop', name:'Sound Pop', emoji:'🔤', href:'sound-pop.html', group:'en' },
  { id:'colourpop', name:'Colour Pop', emoji:'🎨', href:'colour-pop.html', group:'en' },
  { id:'thingspop', name:'Things Pop', emoji:'🧸', href:'things-pop.html', group:'en' },
  { id:'otopop', name:'おとポップ', emoji:'🔤', href:'oto-pop.html', group:'ja' },
  { id:'iropop', name:'いろポップ', emoji:'🎨', href:'iro-pop.html', group:'ja' },
  { id:'monopop', name:'モノポップ', emoji:'🧸', href:'mono-pop.html', group:'ja' },
];
const skills = [
  { key:'listen', label:'I can listen' },
  { key:'say', label:'I can say' },
  { key:'read', label:'I can read' },
];

const liveCounts = {};
const liveRatings = {};

function getCount(id){
  return liveCounts[id] || 0;
}
function getRating(id, key){
  return liveRatings[id + '_' + key] || 0;
}
function setRating(id, key, value){
  firebase.database().ref('ratings/' + id + '/' + key).set(value);
}

function attachListeners(){
  const db = firebase.database();
  apps.forEach(app => {
    db.ref('openCount/' + app.id).on('value', snap => {
      liveCounts[app.id] = snap.val() || 0;
      render();
    });
    skills.forEach(s => {
      db.ref('ratings/' + app.id + '/' + s.key).on('value', snap => {
        liveRatings[app.id + '_' + s.key] = snap.val() || 0;
        render();
      });
    });
  });
}

firebase.auth().onAuthStateChanged(user => {
  if (user) attachListeners();
});

function starsHtml(id, key){
  const current = getRating(id, key);
  let html = '';
  for (let i = 1; i <= 5; i++){
    html += `<span class="star${i <= current ? ' filled' : ''}" data-id="${id}" data-key="${key}" data-val="${i}">★</span>`;
  }
  return html;
}

function cardHtml(app){
  const count = getCount(app.id);
  const countText = count === 1 ? '1 visit' : count + ' visits';
  const skillRows = skills.map(s => `
    <div class="skill-row">
      <div class="skill-label">${s.label}</div>
      <div class="stars">${starsHtml(app.id, s.key)}</div>
    </div>
  `).join('');
  return `
    <div class="card">
      <a class="card-top" href="${app.href}" style="text-decoration:none;">
        <div class="card-emoji">${app.emoji}</div>
        <div class="card-titlewrap">
          <div class="card-title">${app.name}</div>
          <div class="card-count">${countText}</div>
        </div>
        <div class="go">Open</div>
      </a>
      <div class="skills">${skillRows}</div>
    </div>
  `;
}

function render(){
  const container = document.getElementById('cards');
  const enApps = apps.filter(a => a.group === 'en');
  const jaApps = apps.filter(a => a.group === 'ja');
  container.innerHTML =
    '<div class="section-title">English</div>' +
    enApps.map(cardHtml).join('') +
    '<div class="section-title">日本語</div>' +
    jaApps.map(cardHtml).join('');

  container.querySelectorAll('.star').forEach(star => {
    star.addEventListener('click', (e) => {
      e.preventDefault();
      const { id, key, val } = star.dataset;
      const current = getRating(id, key);
      const newVal = current === Number(val) ? Number(val) - 1 : Number(val);
      setRating(id, key, newVal);
      render();
    });
  });
}

render();
</script>
</body>
</html>
