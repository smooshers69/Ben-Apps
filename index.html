<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ben's Apps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2B2140;
    --paper:#FFF8EC;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; min-height:100%;
    background:var(--paper);
    font-family:'Nunito', sans-serif;
  }
  .app{
    max-width:520px;
    margin:0 auto;
    padding: max(20px, env(safe-area-inset-top)) 16px 40px;
  }
  h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:28px;
    color:var(--ink);
    text-align:center;
    margin:6px 0 24px;
  }
  h1 span{ color:#FF6B5B; }
  .card{
    display:block;
    text-decoration:none;
    border:5px solid var(--ink);
    border-radius:28px;
    padding:16px 18px 14px;
    margin-bottom:18px;
    background:#fff;
    position:relative;
  }
  .card-top{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .card-emoji{
    font-size:44px;
    line-height:1;
    flex-shrink:0;
  }
  .card-titlewrap{ flex:1; min-width:0; }
  .card-title{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:21px;
    color:var(--ink);
    margin:0 0 2px;
  }
  .card-count{
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:13px;
    color:var(--ink);
    opacity:0.65;
  }
  .go{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:14px;
    color:#fff;
    background:var(--ink);
    padding:7px 14px;
    border-radius:999px;
    white-space:nowrap;
  }
  .skills{
    margin-top:14px;
    padding-top:12px;
    border-top:2px dashed #E4DCC8;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .skill-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .skill-label{
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--ink);
    flex-shrink:0;
  }
  .stars{
    display:flex;
    gap:2px;
  }
  .star{
    font-size:22px;
    line-height:1;
    cursor:pointer;
    filter: grayscale(1) opacity(0.35);
  }
  .star.filled{
    filter:none;
  }
  .footnote{
    text-align:center;
    font-size:12px;
    color:var(--ink);
    opacity:0.5;
    margin-top:8px;
  }
</style>
</head>
<body>
<div class="app">
  <h1>Ben's <span>Apps</span></h1>
  <div id="cards"></div>
  <div class="footnote">Tap a card to open · tap the stars to rate</div>
</div>

<script>
const apps = [
  { id:'soundpop', name:'Sound Pop', emoji:'🔤', href:'sound-pop.html' },
  { id:'colourpop', name:'Colour Pop', emoji:'🎨', href:'colour-pop.html' },
  { id:'thingspop', name:'Things Pop', emoji:'🧸', href:'things-pop.html' },
];
const skills = [
  { key:'listen', label:'I can listen' },
  { key:'say', label:'I can say' },
  { key:'read', label:'I can read' },
];

function getCount(id){
  return parseInt(localStorage.getItem('openCount_' + id) || '0', 10);
}
function getRating(id, key){
  return parseInt(localStorage.getItem('rating_' + id + '_' + key) || '0', 10);
}
function setRating(id, key, value){
  localStorage.setItem('rating_' + id + '_' + key, String(value));
}

function starsHtml(id, key){
  const current = getRating(id, key);
  let html = '';
  for (let i = 1; i <= 5; i++){
    html += `<span class="star${i <= current ? ' filled' : ''}" data-id="${id}" data-key="${key}" data-val="${i}">★</span>`;
  }
  return html;
}

function render(){
  const container = document.getElementById('cards');
  container.innerHTML = apps.map(app => {
    const count = getCount(app.id);
    const countText = count === 1 ? '1 visit' : count + ' visits';
    const skillRows = skills.map(s => `
      <div class="skill-row">
        <div class="skill-label">${s.label}</div>
        <div class="stars">${starsHtml(app.id, s.key)}</div>
      </div>
    `).join('');
    return `
      <div class="card">
        <a class="card-top" href="${app.href}" style="text-decoration:none;">
          <div class="card-emoji">${app.emoji}</div>
          <div class="card-titlewrap">
            <div class="card-title">${app.name}</div>
            <div class="card-count">${countText}</div>
          </div>
          <div class="go">Open</div>
        </a>
        <div class="skills">${skillRows}</div>
      </div>
    `;
  }).join('');

  container.querySelectorAll('.star').forEach(star => {
    star.addEventListener('click', (e) => {
      e.preventDefault();
      const { id, key, val } = star.dataset;
      const current = getRating(id, key);
      const newVal = current === Number(val) ? Number(val) - 1 : Number(val);
      setRating(id, key, newVal);
      render();
    });
  });
}

render();
</script>
</body>
</html>
